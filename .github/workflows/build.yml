name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    # GobchatEx.csproj targets net10.0-windows (Dalamud.NET.Sdk); it will not
    # build on non-Windows runners.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud dev assemblies
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore (locked)
        run: dotnet restore GobchatEx.slnx --locked-mode

      - name: Build solution
        run: dotnet build GobchatEx.slnx -c Release --no-restore

      - name: Run Core tests
        run: dotnet test tests/GobchatEx.Core.Tests/GobchatEx.Core.Tests.csproj -c Release --no-build
